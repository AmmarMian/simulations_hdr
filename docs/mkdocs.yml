site_name: HDR Simulations
site_description: Companion code documentation for the HDR dissertation
docs_dir: docs
site_dir: site

theme:
  name: null
  custom_dir: overrides

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      use_pygments: true
      css_class: highlight
      pygments_lang_class: true
      linenums: true
      linenums_style: table
  - pymdownx.superfences
  - tables
  - toc:
      permalink: false
      toc_depth: 3

hooks:
  - hooks/git_dates.py

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - ../shared
            - ../2-detection
            - ../3-machinelearning
            - ../4-deeplearning
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2
            docstring_style: numpy

nav:
  - Home: index.md
  - Experiments:
    - Overview: experiments-overview.md
    - "1 · Context": chapters/1-context.md
    - "2 · Detection": chapters/2-detection.md
    - "3 · Machine Learning": chapters/3-machinelearning.md
    - "4 · Deep Learning": chapters/4-deeplearning.md
  - API:
    - Overview: api.md
    - Shared:
      - "plot_style": api/plot_style.md
      - "plotly_style": api/plotly_style.md
    - "2 · Detection":
      - "backend": api/backend.md
      - "estimation": api/estimation.md
      - "estimation_kronecker": api/estimation_kronecker.md
      - "estimation_online": api/estimation_online.md
      - "manifolds": api/manifolds.md
      - "detection": api/detection.md
      - "simulation": api/simulation.md
      - "exporter": api/exporter.md
  - Kitchen Sink: kitchen-sink.md
