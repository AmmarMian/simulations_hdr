site_name: HDR Simulations
site_description: Companion code documentation for the HDR dissertation
docs_dir: docs
site_dir: site

theme:
  name: null
  custom_dir: overrides

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      use_pygments: true
      css_class: highlight
      pygments_lang_class: true
      linenums: true
      linenums_style: table
  - pymdownx.superfences
  - tables
  - toc:
      permalink: false
      toc_depth: 3

hooks:
  - hooks/git_dates.py

not_in_nav: |
  experiments/**

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - ..
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2
            docstring_style: numpy

nav:
  - Home: index.md
  - Experiments:
    - Overview: experiments-overview.md
    - "1 · Context": chapters/1-context.md
    - "2 · Detection": chapters/2-detection.md
    - "3 · Machine Learning": chapters/3-machinelearning.md
    - "4 · Deep Learning": chapters/4-deeplearning.md
  - API:
    - Overview: api.md
    - "hdrlib.core":
      - "backend": api/core/backend.md
      - "detection": api/core/detection.md
      - "estimation": api/core/estimation.md
      - "manifolds": api/core/manifolds.md
      - "simulation": api/core/simulation.md
      - "exporter": api/core/exporter.md
      - "mc": api/core/mc.md
      - "plot_style": api/core/plot_style.md
      - "plotly_style": api/core/plotly_style.md
      - "hardware_ressources": api/core/hardware_ressources.md
      - "logging_config": api/core/logging_config.md
    - "hdrlib.sar":
      - "detectors": api/sar/detectors.md
      - "estimation_kronecker": api/sar/estimation_kronecker.md
      - "estimation_online": api/sar/estimation_online.md
      - "detection_online": api/sar/detection_online.md
      - "simulation": api/sar/simulation.md
      - "mc": api/sar/mc.md
    - "hdrlib.sonar":
      - "detectors": api/sonar/detectors.md
      - "estimation": api/sonar/estimation.md
      - "simulation": api/sonar/simulation.md
      - "mc": api/sonar/mc.md
  - Kitchen Sink: kitchen-sink.md
