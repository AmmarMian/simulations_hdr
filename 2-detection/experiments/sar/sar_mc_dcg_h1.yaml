name: sar_mc_dcg_h1
description: MC power curve — OnlineDCGGLRT vs DCGGLRT under H1 (change detection)
path: 2-detection/sar_experiments/mc_simulations
executable: 2-detection/sar_experiments/mc_simulations/mc_dcg_h1.py
executable_command: .venv/bin/python
tags:
  - detection
  - dcg
  - H1
  - monte-carlo
  - power-curve
actions:
  - plot:
      name: plot
      executable: 2-detection/sar_experiments/action_plot.py
      executable_command: .venv/bin/python
      description: Plot all power curves found in the run directory

  - add_to_docs:
      name: add_to_docs
      executable: 2-detection/sar_experiments/mc_simulations/action_add_to_docs.py
      executable_command: .venv/bin/python
      description: Publish power curve figure to the docs
  - register:
      name: register
      executable: register_latex.py
      executable_command: .venv/bin/python
      description: Copy a chosen figure + provenance into the HDR LaTeX repo
group: "SAR · Monte Carlo"
