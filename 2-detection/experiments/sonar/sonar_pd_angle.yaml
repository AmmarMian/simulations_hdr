name: sonar_pd_angle
description: MC PD vs (theta1, theta2) angle map for sonar two-array detectors at fixed SNR
path: 2-detection/sonar_experiments/mc_simulations
executable: 2-detection/sonar_experiments/mc_simulations/mc_pd_angle.py
executable_command: .venv/bin/python
tags:
  - sonar
  - detection
  - monte-carlo
  - angle-map
params:
  m: 64
  K: 256
  n_trials: 1000
  n_trials_h0: 1000
  n_theta: 51
  theta_min: -75.0
  theta_max: 75.0
  snr_db: -12.0
  pfa: 0.01
  clutter: gaussian
actions:
  - plot:
      name: plot
      executable: 2-detection/sar_experiments/action_plot.py
      executable_command: .venv/bin/python
      description: Run all auto-generated *_plot.py scripts in the run directory
  - register:
      name: register
      executable: register_latex.py
      executable_command: .venv/bin/python
      description: Copy a chosen figure + provenance into the HDR LaTeX repo
group: "Sonar · Detection"
